[theme]
# The accent color for buttons and interactive elements
primaryColor = "#007BFF" 

# The main background of your app
backgroundColor = "#FFFFFF"

# The background for the sidebar and input widgets
secondaryBackgroundColor = "#F0F2F6"

# The main text color
textColor = "#262730"

# Options: "sans serif", "serif", or "monospace"
font = "sans serif"

[server]
# This ensures your app reloads when you save the file
headless = true
enableCORS = false