name: Komu Scout Auto-Crawl

on:
  workflow_dispatch: # This REVEALS the "Run workflow" button
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *' # Optional: Runs every midnight

jobs:
  crawl:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up future runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests trafilatura urllib3 pinecone-client google-generativeai beautifulsoup4 grpcio==1.60.0

      - name: Run Komu Scout
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_ENVIRONMENT: ${{ secrets.PINECONE_ENVIRONMENT }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
        run: |
          python crawler.py
        # This prevents a single network glitch from showing a red "Failure" 
        continue-on-error: true 

      - name: Upload Indexing Log
        uses: actions/upload-artifact@v4
        with:
          name: indexed-sites-list
          path: indexed_sites.txt
          
