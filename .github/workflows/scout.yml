import threading
import time
import requests
import random
from bs4 import BeautifulSoup
from urllib.parse import urljoin
from indexer import index_website

# --- SETTINGS ---
MAX_THREADS = 2 
SEED_URLS = ["https://github.com", "https://www.bbc.com"] # Add your seed sites here

# --- SHARED STATE ---
visited = set()
queue = SEED_URLS.copy()
queue_lock = threading.Lock()
file_lock = threading.Lock()

def worker(worker_id):
    while True:
        with queue_lock:
            if not queue:
                break
            url = queue.pop(0)
            if url in visited:
                continue
            visited.add(url)

        print(f"\n[Worker-{worker_id}] 🎯 Targeting: {url}")
        
        # Call the Indexer
        success = index_website(url)
        
        if success:
            # Save success to local record
            with file_lock:
                with open("indexed_sites.txt", "a") as f:
                    f.write(f"{url}\n")
            
            # Find new links to expand the crawl
            try:
                resp = requests.get(url, timeout=10)
                soup = BeautifulSoup(resp.text, 'html.parser')
                found_count = 0
                for link in soup.find_all('a', href=True):
                    full_url = urljoin(url, link['href'])
                    if full_url.startswith('http') and full_url not in visited:
                        with queue_lock:
                            if len(queue) < 1000: # Don't let the queue explode
                                queue.append(full_url)
                                found_count += 1
                print(f"🔗 Worker-{worker_id} found {found_count} new links.")
            except:
                pass

        # Nigerian Internet/API Safety: Slow and steady prevents 429 errors
        time.sleep(random.uniform(2, 4))

def run_crawler():
    print("🚀 KOMU SCOUT STARTING...")
    threads = []
    for i in range(MAX_THREADS):
        t = threading.Thread(target=worker, args=(i+1,))
        t.start()
        threads.append(t)
        
    for t in threads:
        t.join()
    print("🏁 CRAWL COMPLETE.")

if __name__ == "__main__":
    run_crawler()
    
