name: Komu Scout Auto-Crawl

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch: # Allows you to start it manually from GitHub.com

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests trafilatura urllib3 tqdm

      - name: Run Crawler
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }} # Uses your secret key safely
        run: python crawler.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Komu-Bot"
          git config --global user.email "bot@komumv.com"
          git add indexed_sites.txt
          git commit -m "Auto-update indexed sites [skip ci]" || echo "No changes to commit"
          git push
          
