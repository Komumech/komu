name: Komu Scout Auto-Crawl

on:
  schedule:
    # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows you to start it manually anytime

# Required to allow the bot to write changes back to your repository
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4 for better performance
        with:
          fetch-depth: 0 # Fetches full history so git push works better

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests trafilatura urllib3 tqdm

      - name: Run Crawler
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python crawler.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Komu-Bot"
          git config --global user.email "bot@komumv.com"
          
          # Pull latest changes in case you edited seeds on your laptop
          git pull origin main --rebase
          
          git add indexed_sites.txt
          # The [skip ci] tag prevents the bot from triggering another run
          git commit -m "Auto-update indexed sites [skip ci]" || echo "No changes to commit"
          git push origin main
          
