name: Komu Scout Auto-Crawl

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Added beautifulsoup4 and a stable grpcio version to prevent memory crashes
          pip install requests trafilatura urllib3 tqdm pinecone-client google-generativeai beautifulsoup4 grpcio==1.60.0

      - name: Run Crawler
        env:
          # These pull directly from your GitHub Repo Secrets
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_ENVIRONMENT: ${{ secrets.PINECONE_ENVIRONMENT }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
        run: python crawler.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Komu-Bot"
          git config --global user.email "bot@komumv.com"
          
          # This prevents "rejected push" errors if the bot runs frequently
          git pull origin main --rebase
          
          git add indexed_sites.txt
          git commit -m "Auto-update indexed sites [skip ci]" || echo "No changes to commit"
          git push origin main
          
