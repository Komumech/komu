name: Komu Scout Auto-Crawl

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests trafilatura urllib3 tqdm

      - name: Run Crawler
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python crawler.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Komu-Bot"
          git config --global user.email "bot@komumv.com"
          git add indexed_sites.txt
          git commit -m "Auto-update indexed sites [skip ci]" || echo "No changes to commit"
          git push origin main
          
